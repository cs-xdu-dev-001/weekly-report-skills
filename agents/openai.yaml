interface:
  display_name: "科研周报"
  short_description: "从 Notion 科研推进记录整理三段式中文科研周报"
  default_prompt: "请按标准三段式帮我整理科研周报：1. 目标周/日期：；2. 材料来源：优先 Notion 科研推进、科研工作记录和最新周报；3. 输出结构：本周工作、后续计划、相关问题；4. 特别要求：参考最新周报详略，避免和之前内容重复；如记录中有实验结果、流程图、对比数据或截图，请优先引用或整理已有图表，只有流程关系清楚时才生成 Mermaid 流程图，没有明确来源时不要编造图表；只输出一个统一版本；输出草稿时标题用干净 Markdown，不写 {toggle} 伪语法；优先贴近用户草稿，不主动新增材料外的问题或结论。"
